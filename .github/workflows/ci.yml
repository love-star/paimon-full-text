name: CI

on:
  push:
    branches:
      - main
      - release-*
  pull_request:
    branches:
      - main
      - release-*

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Validate .asf.yaml
        run: pip install pyyaml -q && python3 tools/validate_asf_yaml.py

      - name: Check ASF license headers
        run: python3 tools/check_license_headers.py

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.0

      - name: Check dependency licenses (Apache-compatible)
        run: cargo deny --locked check licenses

      - name: Check Rust security advisories
        run: cargo deny --locked check advisories

      - name: Verify Rust dependency metadata
        run: |
          cargo deny --locked list -f tsv -t 0.6 > /tmp/DEPENDENCIES.rust.tsv
          diff -u DEPENDENCIES.rust.tsv /tmp/DEPENDENCIES.rust.tsv

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --workspace --locked -- -D warnings

      - name: Test Rust workspace
        run: cargo test --workspace --locked

      - name: Read minimum supported Rust version
        id: minimum_rust_version
        run: |
          minimum_rust_version="$(
            cargo metadata --locked --format-version 1 --no-deps |
              jq -er '
                [.packages[].rust_version] | unique |
                if length == 1 and .[0] != null then .[0]
                else error("workspace packages must declare one common rust-version")
                end
              '
          )"
          echo "version=${minimum_rust_version}" >> "${GITHUB_OUTPUT}"

      - name: Install minimum supported Rust version
        env:
          MINIMUM_RUST_VERSION: ${{ steps.minimum_rust_version.outputs.version }}
        run: rustup toolchain install "${MINIMUM_RUST_VERSION}" --profile minimal --no-self-update

      - name: Test Rust workspace with minimum supported Rust version
        env:
          MINIMUM_RUST_VERSION: ${{ steps.minimum_rust_version.outputs.version }}
        run: rustup run "${MINIMUM_RUST_VERSION}" cargo test --workspace --locked

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build JNI library
        run: cargo build --release -p paimon-ftindex-jni

      - name: Test Java API
        run: mvn -q -f java/pom.xml test
        env:
          PAIMON_FTINDEX_JNI_LIB_PATH: ${{ github.workspace }}/target/release/libpaimon_ftindex_jni.so

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build FFI library
        run: cargo build --release -p paimon-ftindex-ffi

      - name: Test Python API
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m pytest -q tests
        env:
          PAIMON_FTINDEX_LIB_PATH: ${{ github.workspace }}/target/release
