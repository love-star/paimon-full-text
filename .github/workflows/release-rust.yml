# Publish paimon-ftindex-core crate to crates.io.
#
# Trigger: called by release.yml or manually dispatched.
# Pre-release tags (containing '-') only run dry-run checks without publishing.
#
# Token auth: add secret CARGO_REGISTRY_TOKEN for crates.io publishing.

name: Release Rust

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: release-rust-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        run: |
          rustup update stable
          rustup default stable

      - name: Dry run
        shell: bash
        run: |
          set -euo pipefail
          package_files="$(cargo package -p paimon-ftindex-core --locked --list)"
          grep -qx LICENSE <<<"$package_files"
          grep -qx NOTICE <<<"$package_files"
          cargo publish -p paimon-ftindex-core --locked --dry-run

      - name: Publish paimon-ftindex-core to crates.io
        if: github.repository == 'apache/paimon-full-text' && startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
        run: cargo publish -p paimon-ftindex-core --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
