accepted = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]

# Release reports describe linked runtime components. Build-only and test-only
# crates are not bundled in the native libraries.
ignore-build-dependencies = true
ignore-dev-dependencies = true

# tools/generate_license_reports.py always supplies the exact release target(s)
# on the command line. Keeping targets out of this shared config prevents a
# platform-union report from accidentally being copied into every wheel.
